name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  test-and-lint:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov mypy flake8 ruff
    
    - name: Lint with flake8 and ruff
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        ruff check src/ tests/
    
    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports --no-strict-optional
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

  build-windows:
    needs: test-and-lint
    runs-on: windows-latest
    if: github.event_name == 'release'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Install Inno Setup
      run: |
        choco install innosetup -y --no-progress
        echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller build/easy_converter.spec --clean --noconfirm
    
    - name: Sign executable
      continue-on-error: true
      run: |
        $exePath = "dist\EasyConverter.exe"
        if (Test-Path $exePath) {
          Write-Host "Executable built: $exePath"
        } else {
          Write-Error "Executable not found at $exePath"
          exit 1
        }
    
    - name: Prepare tesseract directory for installer
      run: |
        if (-not (Test-Path "build\tesseract")) {
          New-Item -ItemType Directory -Path "build\tesseract" -Force
          "" | Out-File -FilePath "build\tesseract\.placeholder" -Encoding utf8
        }

    - name: Create Installer with Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build/setup.iss
    
    - name: List output files
      run: |
        Get-ChildItem -Path dist -Recurse | Select-Object Name, Length
    
    - name: Upload Release Asset (Installer)
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/EasyConverter-Setup-*.exe
          dist/EasyConverter.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
